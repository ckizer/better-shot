name: SupremeShot
options:
  bundleIdPrefix: com.supremeshot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  SupremeShot:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Backgrounds
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: SupremeShot
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/SupremeShot.entitlements
        MARKETING_VERSION: "0.4.0"
        CURRENT_PROJECT_VERSION: "10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.supremeshot.app.dev
          PRODUCT_NAME: SupremeShot Dev
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application: Court Kizer (C5GYCMZY68)"
          DEVELOPMENT_TEAM: C5GYCMZY68
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.supremeshot.app
    entitlements:
      path: Resources/SupremeShot.entitlements
